name: Preprocessing Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'preprocessing/**'
      - 'winequality_raw/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # Bisa dipicu manual dari GitHub UI

jobs:
  preprocessing:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout repository ────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Setup Python ───────────────────────────────────────────────────
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'
          cache: 'pip'

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn

      # ── 4. Jalankan preprocessing pipeline ───────────────────────────────
      - name: Run Preprocessing Pipeline
        working-directory: preprocessing
        run: |
          python automate_Hizkian.py

      # ── 5. Verifikasi output ──────────────────────────────────────────────
      - name: Verify Output Files
        run: |
          echo "=== Isi folder preprocessing ==="
          ls -la preprocessing/winequality_preprocessing/
          echo ""
          echo "=== Preview winequality_clean.csv ==="
          head -5 preprocessing/winequality_preprocessing/winequality_clean.csv
          echo ""
          echo "=== Jumlah baris ==="
          wc -l preprocessing/winequality_preprocessing/*.csv

      # ── 6. Upload hasil preprocessing ke GitHub sebagai artifact ─────────
      - name: Upload Preprocessing Artifact
        uses: actions/upload-artifact@v4
        with:
          name: winequality-preprocessed-${{ github.run_number }}
          path: preprocessing/winequality_preprocessing/
          retention-days: 30

      # ── 7. Commit dan push dataset terbaru ke repository ─────────────────
      - name: Commit Preprocessed Dataset
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add preprocessing/winequality_preprocessing/
          git add winequality_raw/ || true
          # Hanya commit jika ada perubahan
          git diff --staged --quiet || git commit -m "chore: update preprocessed dataset [skip ci]"
          git push || echo "Nothing to push"
